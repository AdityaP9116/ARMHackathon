name: bench-baseline

# The full baseline suite (BASELINE_TEST_PLAN.md) on real Arm silicon.
# Runs once when this workflow file changes on main, and on demand via
# workflow_dispatch. Numbers from this shared runner are PROVISIONAL;
# dedicated-instance (Ampere A1) runs are the headline grade.
# rev 3: adaptive patch for the has_previous_state transformers API

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/bench-baseline.yml"

permissions:
  contents: write # commit-comment publishing

jobs:
  baseline:
    name: baseline (linux-arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: kernel
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install python deps
        run: python3 -m pip install --quiet numpy torch transformers
      - name: Run full baseline suite
        run: |
          set -o pipefail
          # cap compile-baseline length on the shared runner: Dynamo's
          # unrolled-graph compile time grows superlinearly with L
          PY=python3 COMPILE_MAX_LEN=256 \
            bash bench/run_baseline.sh ci-arm64 2>&1 | tee baseline-run.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-results-ci-arm64
          path: bench/results/
          if-no-files-found: error
      - name: Publish RESULTS.md as commit comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## baseline suite, linux-arm64 CI runner (provisional)"
            echo
            if [ -f bench/results/RESULTS.md ]; then
              head -c 55000 bench/results/RESULTS.md
            else
              echo "(no RESULTS.md produced — last 80 log lines:)"
              echo '```'
              tail -80 baseline-run.log 2>/dev/null || echo "(no log)"
              echo '```'
            fi
          } > comment.md
          cat comment.md >> "$GITHUB_STEP_SUMMARY"
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            -f body="$(cat comment.md)" --silent || true
